{% extends 'admin/base.html' %}

{% block title %}Edit Bus Route - Admin - TicketHub{% endblock %}

{% block admin_content %}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="h3 mb-0">Edit Bus Route</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin_edit_bus_route', route_id=route.id) }}" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Origin</label>
                                <input type="text" class="form-control" name="origin" value="{{ route.origin }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Destination</label>
                                <input type="text" class="form-control" name="destination" value="{{ route.destination }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assigned Operator</label>
                                <select class="form-select" name="operator_id">
                                    <option value="">Unassigned</option>
                                    {% for operator in operators %}
                                        <option value="{{ operator.id }}" {% if route.operator_id == operator.id %}selected{% endif %}>
                                            {{ operator.name }} ({{ operator.email }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bus Number</label>
                                <input type="text" class="form-control" name="bus_number" value="{{ route.bus_number or '' }}" placeholder="e.g., ABC-1234">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bus Type</label>
                                <select class="form-select" name="bus_type">
                                    <option value="">Select Type</option>
                                    <option value="AC" {% if route.bus_type == 'AC' %}selected{% endif %}>AC</option>
                                    <option value="Non-AC" {% if route.bus_type == 'Non-AC' %}selected{% endif %}>Non-AC</option>
                                    <option value="Sleeper" {% if route.bus_type == 'Sleeper' %}selected{% endif %}>Sleeper</option>
                                    <option value="Semi-Sleeper" {% if route.bus_type == 'Semi-Sleeper' %}selected{% endif %}>Semi-Sleeper</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Departure Time</label>
                                <input type="time" class="form-control" name="departure_time" value="{{ route.departure_time.strftime('%H:%M') }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Arrival Time</label>
                                <input type="time" class="form-control" name="arrival_time" value="{{ route.arrival_time.strftime('%H:%M') }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duration</label>
                                <input type="text" class="form-control" name="duration" value="{{ route.duration or '' }}" placeholder="e.g., 8 hours">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price (₱)</label>
                                <input type="number" class="form-control" name="price" value="{{ route.price }}" step="0.01" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Total Seats</label>
                                <input type="number" class="form-control" name="total_seats" value="{{ route.total_seats }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Amenities</label>
                                <input type="text" class="form-control" name="amenities" value="{{ route.amenities or '' }}" placeholder="e.g., WiFi, Charging, AC">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Bus Image</label>
                            <input type="file" class="form-control" name="image" accept="image/png,image/jpeg,image/jpg,image/webp">
                            {% if route.image %}
                                <div class="form-text">Current image: {{ route.image }}</div>
                            {% endif %}
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if route.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="isActive">
                                    Active
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Route</button>
                            <a href="{{ url_for('admin_bus_routes') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
