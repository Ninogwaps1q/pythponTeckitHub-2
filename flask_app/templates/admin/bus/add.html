{% extends 'admin/base.html' %}

{% block title %}Add Bus Route - Admin - TicketHub{% endblock %}

{% block admin_content %}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="h3 mb-0">Add Bus Route</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin_add_bus_route') }}" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Origin</label>
                                <input type="text" class="form-control" name="origin" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Destination</label>
                                <input type="text" class="form-control" name="destination" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assigned Operator</label>
                                <select class="form-select" name="operator_id">
                                    <option value="">Unassigned</option>
                                    {% for operator in operators %}
                                        <option value="{{ operator.id }}">{{ operator.name }} ({{ operator.email }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bus Number</label>
                                <input type="text" class="form-control" name="bus_number" placeholder="e.g., ABC-1234">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bus Type</label>
                                <select class="form-select" name="bus_type">
                                    <option value="">Select Type</option>
                                    <option value="AC">AC</option>
                                    <option value="Non-AC">Non-AC</option>
                                    <option value="Sleeper">Sleeper</option>
                                    <option value="Semi-Sleeper">Semi-Sleeper</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Departure Time</label>
                                <input type="time" class="form-control" name="departure_time" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Arrival Time</label>
                                <input type="time" class="form-control" name="arrival_time" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duration</label>
                                <input type="text" class="form-control" name="duration" placeholder="e.g., 8 hours">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price (₱)</label>
                                <input type="number" class="form-control" name="price" step="0.01" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Total Seats</label>
                                <input type="number" class="form-control" name="total_seats" value="40" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Amenities</label>
                                <input type="text" class="form-control" name="amenities" placeholder="e.g., WiFi, Charging, AC">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Bus Image</label>
                            <input type="file" class="form-control" name="image" accept="image/png,image/jpeg,image/jpg,image/webp">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Add Route</button>
                            <a href="{{ url_for('admin_bus_routes') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
