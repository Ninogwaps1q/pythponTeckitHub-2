{% extends "admin/base.html" %}

{% block title %}Add Bus - Admin{% endblock %}

{% block admin_content %}
<div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Add New Bus</h1>
    <a href="{{ url_for('admin_buses') }}" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back to Buses
    </a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="bus_name" class="block text-sm font-medium text-gray-700 mb-2">Bus Name</label>
                <input type="text" id="bus_name" name="bus_name" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="e.g., Express Liner 101">
            </div>
            
            <div>
                <label for="bus_type" class="block text-sm font-medium text-gray-700 mb-2">Bus Type</label>
                <select id="bus_type" name="bus_type" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="Standard">Standard</option>
                    <option value="Luxury">Luxury</option>
                    <option value="Sleeper">Sleeper</option>
                    <option value="Semi-Sleeper">Semi-Sleeper</option>
                    <option value="AC">AC</option>
                    <option value="Non-AC">Non-AC</option>
                </select>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="origin" class="block text-sm font-medium text-gray-700 mb-2">Origin City</label>
                <input type="text" id="origin" name="origin" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="e.g., New York">
            </div>
            
            <div>
                <label for="destination" class="block text-sm font-medium text-gray-700 mb-2">Destination City</label>
                <input type="text" id="destination" name="destination" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="e.g., Boston">
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="departure_time" class="block text-sm font-medium text-gray-700 mb-2">Departure Time</label>
                <input type="time" id="departure_time" name="departure_time" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <div>
                <label for="arrival_time" class="block text-sm font-medium text-gray-700 mb-2">Arrival Time</label>
                <input type="time" id="arrival_time" name="arrival_time" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="price" class="block text-sm font-medium text-gray-700 mb-2">Ticket Price (₱)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="e.g., 45.00">
            </div>
            
            <div>
                <label for="total_seats" class="block text-sm font-medium text-gray-700 mb-2">Total Seats</label>
                <input type="number" id="total_seats" name="total_seats" min="1" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="e.g., 40">
            </div>
        </div>
        
        <div>
            <label for="amenities" class="block text-sm font-medium text-gray-700 mb-2">Amenities (comma-separated)</label>
            <input type="text" id="amenities" name="amenities"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="e.g., WiFi, AC, USB Charging, Reclining Seats">
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                Add Bus
            </button>
            <a href="{{ url_for('admin_buses') }}" class="flex-1 bg-gray-100 text-gray-700 py-3 px-6 rounded-lg font-semibold hover:bg-gray-200 transition-colors text-center">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
