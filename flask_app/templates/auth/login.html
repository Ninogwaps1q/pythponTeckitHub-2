{% extends 'base.html' %}

{% block title %}Login - TicketHub{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, var(--dark) 0%, var(--dark-lighter) 100%); margin-top: -76px; padding-top: 76px;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-2">Welcome Back</h2>
                            <p class="text-muted">Sign in to your account</p>
                        </div>
                        
                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-envelope text-muted"></i>
                                    </span>
                                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label text-muted" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="text-decoration-none" style="color: var(--primary);" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot password?</a>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 mb-4">
                                Sign In <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                            
                            <p class="text-center text-muted mb-0">
                                Don't have an account? 
                                <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold" style="color: var(--primary);">Sign up</a>
                            </p>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <p class="text-white-50 small">
                        Demo Admin: admin@example.com / admin123
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="forgotPasswordForm">
        <div class="modal-header">
          <h5 class="modal-title" id="forgotPasswordModalLabel">Forgot Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="forgotEmail" class="form-label">Enter your email address</label>
            <input type="email" class="form-control" id="forgotEmail" required>
          </div>
          <div id="forgotPasswordMsg" class="small"></div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('forgotEmail').value;
    const msgDiv = document.getElementById('forgotPasswordMsg');
    msgDiv.textContent = '';
    fetch('/api/forgot-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            msgDiv.textContent = "A password reset link has been sent to your email.";
            msgDiv.className = "text-success small";
        } else {
            msgDiv.textContent = data.message || "Failed to send reset email.";
            msgDiv.className = "text-danger small";
        }
    })
    .catch(() => {
        msgDiv.textContent = "Error sending reset email.";
        msgDiv.className = "text-danger small";
    });
});
</script>
{% endblock %}
