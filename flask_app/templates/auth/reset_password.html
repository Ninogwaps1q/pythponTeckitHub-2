{% extends 'base.html' %}

{% block title %}Reset Password - TicketHub{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, var(--dark) 0%, var(--dark-lighter) 100%); margin-top: -76px; padding-top: 76px;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-2">Reset Password</h2>
                            <p class="text-muted">Enter your new password below.</p>
                        </div>
                        <form method="POST">
                            <div class="mb-4">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-control" name="password" placeholder="New password" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3">
                                Reset Password <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
